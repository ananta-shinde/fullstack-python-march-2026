<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>
</head>
<body>
    <section style="display: grid;grid-template-columns: 1fr 1fr 1fr 1fr;column-gap: 5%;height: 100vh;background-color: black;color: white;">
          <h1 style="background-color: brown;">This is 1st item</h1>
          <h1 style="background-color: yellow;">This is 2nd item</h1>
          <h1 style="background-color: brown;">This is 3rd item</h1>
          <h1 style="background-color: yellow;">This is 4th item</h1>
          <h1 style="background-color: brown;grid-column: 2;">This is 3rd item</h1>
          <h1 style="background-color: yellow;">This is 4th item</h1>
    </section>
</body>
</html>
