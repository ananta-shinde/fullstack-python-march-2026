<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex demos</title>
</head>
<body>
    <section style="height: 50vh;background-color: bisque;display: flex;justify-content: space-evenly;align-items: center;">
        <div style="height: 100px;width:100px;background-color: brown;"></div>
        <div style="height: 100px;width:100px;background-color: brown;"></div>
        <div style="height: 100px;width:100px;background-color: brown;"></div>
    </section>
    <section style="height: 50vh;background-color: beige;display: flex;">
        <div style="width: 30%;height: 100%;background-color: cadetblue;display: flex;flex-direction: column;justify-content: space-evenly;align-items: center;">
            <div style="height: 100px;width:100px;background-color: brown;"></div>
            <div style="height: 100px;width:100px;background-color: brown;"></div>
        </div>
        <div style="width: 70%;height: 100%;background-color: cornflowerblue;"></div>
    </section>
</body>
</html>
